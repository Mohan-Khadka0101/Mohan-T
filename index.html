<!DOCTYPE html>
<html>
<head>
    <title>Electronic Devices</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }
        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .icon {
            font-size: 60px;
        }
        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Electronic Devices</h1>

    <div class="container">
        <div class="card">
            <div class="icon">📱</div>
            <h3>Mobile</h3>
            <p>Smartphone device for calling, internet, and apps.</p>
            <button>View More</button>
        </div>

        <div class="card">
            <div class="icon">⌚</div>
            <h3>Smart Watch</h3>
            <p>Wearable device to track time and health.</p>
            <button>View More</button>
        </div>

        <div class="card">
            <div class="icon">💻</div>
            <h3>Laptop</h3>
            <p>Portable computer for work and study.</p>
            <button>View More</button>
        </div>
    </div>

</body>
</html>
